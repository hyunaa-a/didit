<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>didit</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#86E26E;--bg:#fff;--bg2:#F3F3F3;--t:#000;--t2:#696969;--t3:#A0A0A0;--border:#E0E0E0;--red:#FF0000;--yellow:#FFFBB0;--font:'Noto Sans KR',sans-serif;}
body{font-family:var(--font);background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px;}
.phone{width:393px;height:852px;background:#fff;border-radius:44px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,0.6);display:flex;flex-direction:column;}
.sbar{height:50px;display:flex;align-items:center;justify-content:space-between;padding:12px 24px 0;font-size:12px;font-weight:600;flex-shrink:0;}
.scr{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.pg{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
.sc{flex:1;overflow-y:auto;min-height:0;}
.sc::-webkit-scrollbar{display:none;}
.ibtn{background:none;border:none;cursor:pointer;font-family:var(--font);}
.bnav{height:66px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;background:#fff;flex-shrink:0;}
.bni{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 14px;background:none;border:none;font-family:var(--font);}
.hdr{padding:11px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:10px;background:#fff;}
.tbar{height:22px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);overflow:hidden;flex:1;}
.tbar-in{height:100%;background:var(--green);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;transition:width .3s;}
.chip{display:inline-block;padding:5px 14px;border-radius:7px;font-size:14px;font-weight:500;border:1px solid #696969;cursor:pointer;}
.gbtn{background:var(--green);border:1px solid #404040;border-radius:22px;padding:12px;font-size:15px;font-weight:500;font-family:var(--font);cursor:pointer;color:#fff;width:100%;}
.gbtn2{background:var(--bg2);border:1px solid var(--border);border-radius:22px;padding:11px;font-size:14px;font-family:var(--font);cursor:pointer;color:var(--t2);width:100%;}
.ovl{position:absolute;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:100;}
.mbox{background:#fff;border-radius:14px;padding:20px;width:330px;}
.ham{position:absolute;inset:0;z-index:90;display:flex;}
.ham-dim{flex:1;background:rgba(0,0,0,0.4);}
.ham-p{width:290px;background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto;}
.ham-p::-webkit-scrollbar{display:none;}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cl{text-align:center;font-size:11px;color:var(--t2);padding:3px 0;}
.cd{text-align:center;font-size:11px;padding:5px 2px;cursor:pointer;border-radius:50%;}
.cd.sun{color:var(--red);}
.cd.tod{color:var(--green);font-weight:700;}
.cd.sel{background:var(--green);color:#fff;}
.cb{width:14px;height:14px;border:1.5px solid #aaa;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.cb.dn{border-color:#333;}
.cb.dn::after{content:'✓';font-size:10px;font-weight:700;}
.bsh{position:absolute;inset:0;background:rgba(0,0,0,0.4);z-index:100;display:flex;flex-direction:column;justify-content:flex-end;}
.bsh-box{background:#fff;border-radius:18px 18px 0 0;padding:0 0 20px;}
</style>
</head>
<body>
<div class="phone">
  <div class="sbar"><span>9:41</span><span>● ● ●</span><span>80% 🔋</span></div>
  <div class="scr" id="scr"></div>
</div>
<script>
const scr=document.getElementById('scr');
const S={
  page:'splash',prev:'home',
  calView:'월',selDate:new Date(2023,1,16),curMonth:new Date(2023,1,1),
  showHam:false,modal:null,addSub:null,
  lockMin:35,lockOn:false,lockLeft:0,lockTimer:null,
  showWrite:false,showNotif:false,
  showUpSheet:false,showUpAdd:false,upName:'',
  editMid:null,midName:'',midColor:'#FFE8A3',midVis:'팔로워 공개',midParent:1,
  subText:'',subRepeat:'없음',
  repView:'주',repWeek:3,
  gsCat:'#취업',badgePop:null,
  viewUser:null,kw:'',followTab:'팔로워',
  tDate:null,tTime:null,tDetail:'',tMonth:new Date(2023,1,1),
  postBody:'',postTags:'',postPhotos:[],postCat:'일상',socialCat:null,feedMenu:null,editPostIdx:null,editPostBody:'',editPostTags:'',
  goals:[
    {id:1,name:'원하는 곳에 취업하기',exp:true,subs:[
      {id:'1a',name:'토익900',color:'#FFE8A3',open:true,items:[
        {id:'t1',name:'RC 1회 풀기',done:false,memo:''},
        {id:'t2',name:'LC 1회 풀기',done:false,memo:''},
        {id:'t3',name:'단어 DAY1 암기',done:true,memo:'완료!'},
      ]},
      {id:'1b',name:'컴활1급',color:'#B9B3FF',open:true,items:[
        {id:'t4',name:'컴활 강의 듣기',done:false,memo:''},
        {id:'t5',name:'모의고사 1회 풀기',done:false,memo:''},
      ]},
    ]},
    {id:2,name:'건강한 몸 만들기',exp:true,subs:[
      {id:'2a',name:'운동',color:'#FFD6D6',open:true,items:[
        {id:'t6',name:'하루 만보걷기',done:false,memo:''},
        {id:'t7',name:'필라테스 가기',done:false,memo:''},
      ]},
    ]},
  ],
  followers:[{name:'지나',color:'#86E26E',active:true},{name:'샘',color:'#FFB347',active:true},{name:'카일',color:'#87CEEB',active:false},{name:'라비',color:'#DDA0DD',active:false}],
  alarms:['오전 10:00'],
  feeds:[
    {user:'하이드',av:'하',color:'#86E26E',tags:'#일상 #맛집탐방',title:'새로운 최애맛집 발견!',body:'요즘 취미인 맛집탐방 중인데 동네 돌아다니다 줄서있길래 들어가봤는데 완전 최애맛집으로 선정 완료!',time:'1시간전',hasImg:true,imgEmoji:'🍽️',likes:12,comments:3,liked:false,following:false,exp:false,cat:'일상'},
    {user:'체리맛쿠키',av:'체',color:'#FFB347',tags:'#목표 #취업 #토익',title:'드디어 토익 900점!',body:'계속 800후반 간당간당하다 드디어 900점 달성! 포기하지 않길 잘했어요.',time:'2시간전',hasImg:false,likes:47,comments:8,liked:false,following:false,exp:false,cat:'취업'},
    {user:'갓생러',av:'갓',color:'#87CEEB',tags:'#자기계발 #컴활',title:'컴활 1급 합격 🎉',body:'6개월 준비 끝에 컴활 1급 합격! 꾸준함의 결실이네요.',time:'3시간전',hasImg:false,likes:31,comments:5,liked:false,following:false,exp:false,cat:'자기계발'},
  ],
  notifs:[
    {av:'체',color:'#FFB347',msg:'체리맛쿠키님이 게시글에 좋아요를 눌렀습니다.',time:'1시간 전',read:false},
    {av:'갓',color:'#87CEEB',msg:'갓생러님이 게시글에 댓글을 남겼습니다.',time:'2시간 전',read:false},
    {av:'지',color:'#86E26E',msg:'지나님이 팔로우하기 시작했습니다.',time:'3시간 전',read:true},
  ],
};

const R=()=>render();
function pct(){let t=0,d=0;S.goals.forEach(g=>g.subs.forEach(s=>s.items.forEach(i=>{t++;if(i.done)d++;})));return t?Math.round(d/t*100):0;}
function go(p){S.prev=S.page;S.page=p;S.showHam=false;R();}
function goHome(){S.page='home';S.showHam=false;S.modal=null;R();}

function render(){
  const p=S.page;
  if(p==='splash')rSplash();
  else if(p==='login')rLogin();
  else if(p==='home')rHome();
  else if(p==='stats')rStats();
  else if(p==='report')rReport();
  else if(p==='goalStats')rGoalStats();
  else if(p==='badges')rBadges();
  else if(p==='lock')rLock();
  else if(p==='social')rSocial();
  else if(p==='addSub')rAddSub();
  else if(p==='addMid')rAddMid();
  else if(p==='category')rCategory();
  else if(p==='explore')rExplore();
  else if(p==='keyword')rKeyword();
  else if(p==='userFeed')rUserFeed();
  else if(p==='followList')rFollowList();
  else if(p==='teaching')rTeaching();
}

function BN(a){
  const tabs=[['home','🏠','홈'],['stats','📊','통계'],['lock','🔒','잠금'],['social','👥','소셜']];
  return '<div class="bnav">'+tabs.map(([id,ic,lb])=>`<button class="bni" onclick="go('${id}')"><span style="font-size:22px;color:${a===id?'var(--green)':'var(--t2)'};">${ic}</span><span style="font-size:9px;color:${a===id?'var(--green)':'var(--t2)'};">${lb}</span></button>`).join('')+'</div>';
}

function HAM(){
  const upT=S.goals.map(g=>`<span style="padding:3px 9px;border-radius:12px;background:#eee;font-size:11px;">#${g.name.slice(0,4)}</span>`).join('');
  const midC=S.goals.flatMap(g=>g.subs).map(s=>`<span style="padding:3px 9px;border-radius:12px;background:${s.color};font-size:11px;">${s.name}</span>`).join('');
  return `<div class="ham"><div class="ham-dim" onclick="S.showHam=false;R()"></div>
  <div class="ham-p">
    <div style="padding:20px 16px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;position:relative;">
      <div style="width:48px;height:48px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:700;">그</div>
      <div><div style="font-size:18px;font-weight:700;">그릿</div><div style="font-size:11px;color:var(--t2);">aaa@gmail.com</div></div>
      <button class="ibtn" style="position:absolute;right:14px;top:18px;font-size:20px;" onclick="S.showHam=false;alert('설정')">⚙️</button>
    </div>
    <div style="padding:8px 16px 2px;font-size:12px;font-weight:700;color:var(--t2);">프로 기능</div>
    <div style="padding:11px 16px;border-bottom:1px solid #f0f0f0;font-size:15px;cursor:pointer;" onclick="S.showHam=false;go('teaching')">📈 티칭서비스</div>
    <div style="padding:11px 16px;border-bottom:1px solid var(--border);font-size:15px;">📰 목표 달성 뉴스레터</div>
    <div style="padding:11px 16px 6px;border-bottom:1px solid #f0f0f0;cursor:pointer;" onclick="S.showHam=false;go('category')">
      <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:15px;font-weight:700;">⊞ 카테고리</span><span style="color:var(--t3);">›</span></div>
      <div style="margin-top:7px;display:flex;gap:5px;flex-wrap:wrap;">${upT}</div>
      <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px;">${midC}</div>
    </div>
    <div style="padding:11px 16px 6px;cursor:pointer;" onclick="addAlarm()">
      <div style="display:flex;align-items:center;justify-content:space-between;"><span style="font-size:15px;font-weight:700;">🕐 알림설정</span><span style="color:var(--t3);">›</span></div>
      <div style="margin-top:5px;display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px;">${S.alarms.map(a=>`<span style="padding:3px 9px;border-radius:12px;background:#fff;border:1px solid var(--border);font-size:11px;">${a}</span>`).join('')}</div>
    </div>
  </div></div>`;
}

function rSplash(){scr.innerHTML=`<div style="background:#A3E067;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;"><div style="font-size:20px;color:#fff;">You did it</div><div style="font-size:66px;color:#fff;font-weight:900;line-height:1;">didit</div><div style="font-size:20px;color:#fff;">We did it</div></div>`;setTimeout(()=>{S.page='login';R();},1800);}

function rLogin(){scr.innerHTML=`<div class="pg" style="overflow-y:auto;"><div style="background:#A3E067;padding:54px 22px 36px;text-align:center;"><div style="font-size:48px;color:#fff;font-weight:900;">didit</div><div style="color:#fff;font-size:14px;margin-top:6px;">목표 달성을 위한 동기부여</div></div><div style="padding:26px 22px;display:flex;flex-direction:column;gap:12px;"><button style="width:100%;padding:13px;border-radius:22px;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;background:#FEE500;" onclick="goHome()">카카오로 시작하기</button><button style="width:100%;padding:13px;border-radius:22px;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;background:#03C75A;color:#fff;" onclick="goHome()">네이버로 시작하기</button><button style="width:100%;padding:13px;border-radius:22px;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;border:1px solid var(--border);background:#fff;" onclick="goHome()">Google로 시작하기</button><div style="text-align:center;color:var(--t3);font-size:12px;">— 또는 —</div><button style="width:100%;padding:13px;border-radius:22px;font-size:14px;font-weight:500;font-family:var(--font);cursor:pointer;border:none;background:var(--bg2);color:var(--t2);" onclick="goHome()">게스트로 시작하기</button></div></div>`;}

function rHome(){
  const p=pct();let h=`<div class="pg">`;
  if(S.showHam)h+=HAM();
  h+=`<div class="hdr">
    <div style="width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;">그</div>
    <div style="flex:1;display:flex;flex-direction:column;gap:3px;"><div style="font-size:10px;color:var(--t2);">오늘의 달성률</div><div class="tbar"><div class="tbar-in" style="width:${p}%"><span style="font-size:10px;color:#fff;font-weight:700;">${p}%</span></div></div></div>
    <div style="position:relative;display:inline-flex;"><button class="ibtn" style="font-size:20px;" onclick="go('social')">🔔</button>${S.notifs.filter(n=>!n.read).length?'<div style="position:absolute;top:0;right:0;width:8px;height:8px;border-radius:50%;background:#FF2E2E;"></div>':''}</div>
    <button class="ibtn" style="font-size:22px;" onclick="S.showHam=!S.showHam;R()">☰</button>
  </div>`;
  // followers
  h+=`<div style="padding:9px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0;">
    <div onclick="go('followList')" style="width:46px;height:46px;border-radius:50%;border:2px dashed #aaa;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;">👥</div>
    ${S.followers.map(f=>`<div onclick="S.viewUser='${f.name}';go('userFeed')" style="width:46px;height:46px;border-radius:50%;background:${f.color};border:2.5px solid ${f.active?'var(--green)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;">${f.name[0]}</div>`).join('')}
    <div onclick="go('explore')" style="width:46px;height:46px;border-radius:50%;border:2px dashed #aaa;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0;">🔍</div>
  </div>`;
  // calendar
  h+=calHTML();
  // todo
  h+=`<div class="sc" style="padding:11px 16px;">`;
  S.goals.forEach((g,gi)=>{
    h+=`<div onclick="S.goals[${gi}].exp=!S.goals[${gi}].exp;R()" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;cursor:pointer;"><span style="font-size:18px;font-weight:600;">${g.name}</span><span style="font-size:12px;color:var(--t3);">${g.exp?'▲':'▼'}</span></div>`;
    if(g.exp){
      g.subs.forEach((s,si)=>{
        h+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${s.open?'5px':'11px'};">
          <span class="chip" style="background:${s.color}">${s.name}</span>
          <button class="ibtn" style="font-size:12px;color:var(--t2);padding:3px 7px;" onclick="S.goals[${gi}].subs[${si}].open=!S.goals[${gi}].subs[${si}].open;R()">${s.open?'▼':'▲'}</button>
        </div>`;
        if(s.open){
          s.items.forEach((item,ii)=>{
            const mn=item.name.replace(/'/g,"\\'").replace(/"/g,"&quot;");
            const mm=(item.memo||'').replace(/'/g,"\\'");
            h+=`<div style="display:flex;align-items:center;gap:9px;padding:6px 3px;border-bottom:1px solid #f5f5f5;cursor:pointer;" onclick="S.modal={gi:${gi},si:${si},ii:${ii}};R()">
              <div class="cb${item.done?' dn':''}" onclick="event.stopPropagation();S.goals[${gi}].subs[${si}].items[${ii}].done=!S.goals[${gi}].subs[${si}].items[${ii}].done;S.goals[${gi}].subs[${si}].items.sort((a,b)=>a.done-b.done);R()"></div>
              <span style="font-size:14px;${item.done?'color:#bbb;text-decoration:line-through;':''}">${item.name}</span>
            </div>`;
          });
          h+=`<div style="font-size:12px;color:var(--t3);padding:6px 3px;cursor:pointer;" onclick="S.addSub={gi:${gi},si:${si}};S.subText='';go('addSub')">+ 새 목표 추가</div>`;
        }
      });
    }
    h+=`<div style="height:1px;background:var(--border);margin:9px 0;"></div>`;
  });
  h+=`</div>`;
  // modal
  if(S.modal){
    const {gi,si,ii}=S.modal;const item=S.goals[gi].subs[si].items[ii];
    const mn=item.name.replace(/'/g,"\\'");const mm=(item.memo||'').replace(/'/g,"\\'");
    h+=`<div class="ovl" onclick="S.modal=null;R()"><div class="mbox" onclick="event.stopPropagation()">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px;">${item.name}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;">
        <div onclick="const n=prompt('수정:','${mn}');if(n&&n.trim()){S.goals[${gi}].subs[${si}].items[${ii}].name=n.trim();}S.modal=null;R()" style="padding:13px;border-radius:8px;background:#FFFBB0;text-align:center;cursor:pointer;">✏️<div style="font-size:11px;margin-top:3px;">수정</div></div>
        <div onclick="S.goals[${gi}].subs[${si}].items.splice(${ii},1);S.modal=null;R()" style="padding:13px;border-radius:8px;background:#FF6B6B;text-align:center;cursor:pointer;">🗑️<div style="font-size:11px;margin-top:3px;">삭제</div></div>
        <div onclick="const m=prompt('메모:','${mm}');if(m!==null){S.goals[${gi}].subs[${si}].items[${ii}].memo=m;}S.modal=null;R()" style="padding:13px;border-radius:8px;background:#E6E6E6;text-align:center;cursor:pointer;">📝<div style="font-size:11px;margin-top:3px;">메모</div></div>
        <div onclick="alert('📷 인증!');S.modal=null;R()" style="padding:13px;border-radius:8px;background:#B9B3FF;text-align:center;cursor:pointer;">📷<div style="font-size:11px;margin-top:3px;">인증</div></div>
      </div></div></div>`;
  }
  if(S.lockOn)h+=timerOvl();
  h+=BN('home');h+=`</div>`;
  scr.innerHTML=h;
}

function calHTML(){
  const {curMonth:cm,selDate:sd,calView:cv}=S;
  const y=cm.getFullYear(),m=cm.getMonth(),days=['일','월','화','수','목','금','토'],today=new Date(2023,1,16);
  let h=`<div style="padding:11px 16px;border-bottom:1px solid var(--border);flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;">
      <div style="display:flex;align-items:center;gap:3px;">
        <button class="ibtn" style="font-size:13px;" onclick="prevP()">◀</button>
        <button class="ibtn" style="font-size:13px;" onclick="nextP()">▶</button>
        <span style="font-size:12px;">${y}년 ${m+1}월</span>
      </div>
      <select onchange="S.calView=this.value;R()" style="background:var(--bg2);border:none;font-size:11px;padding:3px 7px;border-radius:5px;font-family:var(--font);">

    <div style="position:relative;width:230px;height:230px;"><svg viewBox="0 0 260 260" width="230" height="230"><circle cx="130" cy="130" r="110" fill="none" stroke="#EFEFEF" stroke-width="20"/><circle cx="130" cy="130" r="110" fill="none" stroke="var(--green)" stroke-width="20" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" stroke-linecap="round" transform="rotate(-90 130 130)"/></svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;"><div style="font-size:40px;font-weight:500;color:#494949;">${String(S.lockMin).padStart(2,'0')}:00</div><div style="font-size:12px;color:var(--t2);">집중 시간 설정</div></div></div>
    <div style="display:flex;gap:12px;align-items:center;"><button onclick="S.lockMin=Math.max(5,S.lockMin-5);R()" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #404040;background:var(--bg2);font-size:17px;cursor:pointer;">−</button><span style="font-size:13px;color:var(--t2);">5분 단위</span><button onclick="S.lockMin=Math.min(120,S.lockMin+5);R()" style="width:40px;height:40px;border-radius:50%;border:1.5px solid #404040;background:var(--bg2);font-size:17px;cursor:pointer;">+</button></div>
    <div style="width:100%;background:var(--bg2);border:1px solid #9C9C9C;border-radius:10px;padding:13px;"><div style="font-size:15px;margin-bottom:9px;">이용 가능한 어플</div><div style="display:flex;gap:9px;align-items:center;"><div style="width:44px;height:44px;border-radius:50%;background:var(--green);font-size:19px;display:flex;align-items:center;justify-content:center;">📱</div><div style="width:44px;height:44px;border-radius:50%;background:#FFB347;font-size:19px;display:flex;align-items:center;justify-content:center;">📞</div><button onclick="alert('앱 추가!')" style="width:44px;height:44px;border-radius:50%;border:2px dashed #404040;background:none;font-size:20px;cursor:pointer;">+</button></div></div>
    <button onclick="startLock()" class="gbtn" style="font-size:17px;">시작</button>
  </div>${BN('lock')}${S.lockOn?timerOvl():''}${S.showHam?HAM():''}${lockNotifHTML()}</div>`;
}
function timerOvl(){const m=Math.floor(S.lockLeft/60),s=S.lockLeft%60;return `<div style="position:absolute;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:200;"><div style="font-size:15px;color:rgba(255,255,255,.6);">집중 모드</div><div style="font-size:66px;font-weight:300;color:#fff;">${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div><div style="font-size:14px;color:rgba(255,255,255,.6);">화이팅! 목표를 향해 집중하세요</div><button onclick="stopLock()" style="margin-top:8px;padding:11px 34px;background:transparent;border:2px solid rgba(255,255,255,.5);border-radius:22px;color:#fff;font-size:14px;font-family:var(--font);cursor:pointer;">종료</button></div>`;}
function startLock(){S.lockOn=true;S.lockLeft=S.lockMin*60;if(S.lockTimer)clearInterval(S.lockTimer);S.lockTimer=setInterval(()=>{if(S.lockLeft<=0){clearInterval(S.lockTimer);S.lockOn=false;}else S.lockLeft--;if(S.page==='lock')rLock();},1000);R();}
function stopLock(){clearInterval(S.lockTimer);S.lockOn=false;R();}

function lockNotifHTML(){
  if(!S.showNotif) return '';
  const unread=S.notifs.filter(n=>!n.read).length;
  return '<div onclick="S.showNotif=false;R()" style="position:absolute;inset:0;z-index:150;display:flex;flex-direction:column;"><div onclick="event.stopPropagation()" style="background:#fff;box-shadow:0 4px 20px rgba(0,0,0,0.12);"><div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);"><span style="font-size:15px;font-weight:700;">알림</span><button class="ibtn" style="font-size:11px;color:var(--green);font-weight:500;" onclick="S.notifs.forEach(n=>n.read=true);R()">모두 읽음</button></div>'+S.notifs.map((n,ni)=>'<div onclick="S.notifs['+ni+'].read=true;R()" style="display:flex;gap:9px;padding:11px 16px;border-bottom:1px solid #f5f5f5;background:'+(n.read?'#fff':'#f0fff0')+';cursor:pointer;"><div style="width:34px;height:34px;border-radius:50%;background:'+n.color+';display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;">'+n.av+'</div><div style="flex:1;"><div style="font-size:12px;line-height:1.5;">'+n.msg+'</div><div style="font-size:10px;color:var(--t3);margin-top:2px;">'+n.time+'</div></div>'+(!n.read?'<div style="width:7px;height:7px;border-radius:50%;background:#FF2E2E;margin-top:3px;flex-shrink:0;"></div>':'')+'</div>').join('')+'</div><div style="flex:1;background:rgba(0,0,0,0.2);"></div></div>';
}

    exercise: `<svg width="100%" height="100%" viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="fg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#FF6B6B"/><stop offset="100%" stop-color="#FF8E53"/></linearGradient></defs><rect width="300" height="160" fill="url(#fg4)" rx="10"/><rect x="30" y="72" width="240" height="16" rx="8" fill="rgba(255,255,255,0.3)"/><rect x="60" y="60" width="16" height="40" rx="8" fill="rgba(255,255,255,0.8)"/><rect x="60" y="50" width="16" height="16" rx="4" fill="rgba(255,255,255,0.6)"/><rect x="60" y="94" width="16" height="16" rx="4" fill="rgba(255,255,255,0.6)"/><rect x="224" y="60" width="16" height="40" rx="8" fill="rgba(255,255,255,0.8)"/><rect x="224" y="50" width="16" height="16" rx="4" fill="rgba(255,255,255,0.6)"/><rect x="224" y="94" width="16" height="16" rx="4" fill="rgba(255,255,255,0.6)"/><circle cx="150" cy="65" r="18" fill="rgba(255,255,255,0.85)"/><text x="150" y="148" text-anchor="middle" font-size="12" fill="rgba(255,255,255,0.9)" font-family="sans-serif">🏋️ 오늘도 운동 완료!</text></svg>`,

}

function rSocial(){
  const cats=['일상','취업','건강','자기계발','재태크'];
  const ics={'일상':'📅','취업':'💼','건강':'🏋️','자기계발':'⚙️','재태크':'🐷'};
  const unread=S.notifs.filter(n=>!n.read).length;
  const sel=S.socialCat; // null = 전체
  const displayFeeds = sel ? S.feeds.filter(f=>f.cat===sel) : S.feeds;
  const ME='그릿';
  let h=`<div class="pg">`;
  h+=`<div class="hdr"><button class="ibtn" style="font-size:20px;" onclick="goHome()">‹</button><span style="font-size:19px;font-weight:700;flex:1;">소셜</span>
    <button onclick="S.showWrite=true;S.postBody='';S.postTags='';S.postPhotos=[];R()" style="width:30px;height:30px;border-radius:8px;border:1.5px solid #404040;background:#fff;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;">⊕</button>
    <div style="position:relative;display:inline-flex;"><button class="ibtn" style="font-size:20px;" onclick="S.showNotif=!S.showNotif;S.showWrite=false;R()">🔔</button>${unread?`<div style="position:absolute;top:0;right:0;width:15px;height:15px;border-radius:50%;background:#FF2E2E;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700;">${unread}</div>`:''}</div>
    <button class="ibtn" style="font-size:20px;" onclick="S.showHam=!S.showHam;R()">☰</button>
  </div>`;
  // 카테고리 아이콘: 선택된 것 한번 더 클릭시 해제
  h+=`<div style="display:flex;justify-content:space-around;padding:9px 7px;border-bottom:1px solid var(--border);flex-shrink:0;">${cats.map(c=>{const on=sel===c;return `<button onclick="S.socialCat=${on?'null':`'${c}'`};S.showHam=false;R()" style="display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;"><div style="width:44px;height:44px;border-radius:10px;background:${on?'#f0fff0':'#f5f5f5'};border:2px solid ${on?'var(--green)':'transparent'};font-size:19px;display:flex;align-items:center;justify-content:center;">${ics[c]}</div><span style="font-size:9px;color:${on?'var(--green)':'var(--t2)'};">${c}</span></button>`;}).join('')}</div>`;
  h+=`<div style="padding:6px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:5px;flex-shrink:0;"><span style="font-size:12px;color:var(--t2);">최신순</span><span style="color:var(--t2);">↕</span></div>`;
  h+=`<div class="sc">`;
  displayFeeds.forEach((f,i)=>{
    const ri=S.feeds.indexOf(f);
    const isMe=f.user===ME;
    // 이미지 타입 결정
    const imgType = f.cat==='건강'?'exercise':f.cat==='취업'||f.cat==='자기계발'?'study':f.cat==='일상'?'food':'nature';
    const actionBtn = isMe
      ? `<button onclick="S.feedMenu=${ri};R()" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--t2);padding:2px 6px;letter-spacing:1px;">⋮</button>`
      : `<button onclick="S.feeds[${ri}].following=!S.feeds[${ri}].following;R()" style="padding:4px 10px;border-radius:12px;border:1.5px solid ${f.following?'#ccc':'#696969'};background:${f.following?'#f5f5f5':'var(--green)'};font-size:11px;font-weight:500;cursor:pointer;color:${f.following?'var(--t2)':'#fff'};font-family:var(--font);">${f.following?'팔로잉':'팔로우'}</button>`;
    h+=`<div style="padding:13px 16px;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:7px;"><div style="width:36px;height:36px;border-radius:50%;background:${f.color};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;">${f.av}</div><div style="flex:1;"><div style="font-size:13px;font-weight:700;">${f.user}</div><div style="font-size:11px;color:#7CAB4F;">${f.tags}</div></div>${actionBtn}</div>
      <div style="font-size:13px;font-weight:600;margin-bottom:5px;">${f.title}</div>
      ${f.hasImg?`<div style="width:100%;height:150px;border-radius:10px;overflow:hidden;margin-bottom:7px;">${feedImg(imgType)}</div>`:''}
      <div style="font-size:12px;color:#444;line-height:1.6;${f.exp?'':'overflow:hidden;max-height:44px;'}">${f.body}</div>
      ${!f.exp?`<span onclick="S.feeds[${ri}].exp=true;R()" style="font-size:11px;color:var(--green);cursor:pointer;">~더보기</span>`:''}
      <div style="display:flex;align-items:center;gap:12px;margin-top:8px;"><button onclick="S.feeds[${ri}].liked=!S.feeds[${ri}].liked;S.feeds[${ri}].likes+=S.feeds[${ri}].liked?1:-1;R()" style="background:none;border:none;font-size:12px;color:${f.liked?'#e05':'var(--t2)'};cursor:pointer;font-family:var(--font);">${f.liked?'❤️':'🤍'} ${f.likes}</button><button class="ibtn" style="font-size:12px;color:var(--t2);" onclick="alert('댓글 기능 준비 중!')">💬 ${f.comments}</button><span style="margin-left:auto;font-size:10px;color:var(--t3);">${f.time}</span></div>
    </div>`;
  });
  h+=`</div>`;
  h+=BN('social');
  if(S.showHam) h+=HAM();
  // 3dot 메뉴
  if(S.feedMenu!=null){
    const fi=S.feedMenu;
    h+=`<div onclick="S.feedMenu=null;R()" style="position:absolute;inset:0;z-index:200;"><div onclick="event.stopPropagation()" style="position:absolute;top:100px;right:20px;background:#fff;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,0.18);overflow:hidden;min-width:120px;">
      <div onclick="openEditPost(${fi})" style="padding:13px 18px;font-size:14px;cursor:pointer;border-bottom:1px solid #f5f5f5;">✏️ 수정</div>
      <div onclick="deletePost(${fi})" style="padding:13px 18px;font-size:14px;cursor:pointer;color:#FF4444;">🗑️ 삭제</div>
    </div></div>`;
  }
  // 수정 팝업
  if(S.editPostIdx!=null){
    const ef=S.feeds[S.editPostIdx];
    h+=`<div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:210;display:flex;flex-direction:column;justify-content:flex-end;"><div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px 16px 0 0;max-height:80%;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 9px;border-bottom:1px solid var(--border);flex-shrink:0;"><button class="ibtn" style="font-size:13px;color:var(--t2);" onclick="S.editPostIdx=null;R()">취소</button><span style="font-size:14px;font-weight:700;">게시글 수정</span><button onclick="saveEditPost()" style="background:var(--green);border:none;border-radius:12px;padding:5px 14px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;color:#fff;">저장</button></div>
      <div class="sc" style="padding:12px 16px;display:flex;flex-direction:column;gap:11px;">
        <div style="display:flex;align-items:center;gap:8px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;">그</div><span style="font-size:13px;font-weight:600;">그릿</span></div>
        <textarea id="epi" oninput="S.editPostBody=this.value" style="width:100%;min-height:100px;border:none;outline:none;font-size:13px;font-family:var(--font);resize:none;line-height:1.6;">${ef.body||''}</textarea>
        <div style="border:1px solid var(--border);border-radius:9px;padding:9px 11px;"><div style="font-size:10px;color:var(--t3);margin-bottom:4px;">해시태그</div><input id="ept" oninput="S.editPostTags=this.value" value="${ef.tags||''}" style="width:100%;border:none;outline:none;font-size:12px;font-family:var(--font);color:var(--green);"></div>
      </div>
    </div></div>`;
  }
  if(S.showWrite){
    const photos=S.postPhotos||[];
    const pEmoji=['🍔','🏋️','📚','🎵','🌿','☕'],pBg=['#FFE8A3','#FFD6D6','#B9E4FF','#C8FFD4','#E8D5FF','#FFB347'];
    h+=`<div style="position:absolute;inset:0;background:rgba(0,0,0,0.55);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;"><div onclick="event.stopPropagation()" style="background:#fff;border-radius:16px 16px 0 0;max-height:84%;display:flex;flex-direction:column;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px 9px;border-bottom:1px solid var(--border);flex-shrink:0;"><button class="ibtn" style="font-size:13px;color:var(--t2);" onclick="S.showWrite=false;R()">취소</button><span style="font-size:14px;font-weight:700;">게시글 작성</span><button onclick="submitPost()" style="background:var(--green);border:none;border-radius:12px;padding:5px 14px;font-size:12px;font-weight:600;font-family:var(--font);cursor:pointer;color:#fff;">게시</button></div>
      <div class="sc" style="padding:12px 16px;display:flex;flex-direction:column;gap:11px;">
        <div style="display:flex;align-items:center;gap:8px;"><div style="width:34px;height:34px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;">그</div><span style="font-size:13px;font-weight:600;">그릿</span></div>
        <textarea id="pbi" placeholder="오늘의 목표 달성 이야기를 공유해보세요!" oninput="S.postBody=this.value" style="width:100%;min-height:90px;border:none;outline:none;font-size:13px;font-family:var(--font);resize:none;line-height:1.6;">${S.postBody||''}</textarea>

  const cmap={지나:'#86E26E',샘:'#FFB347',카일:'#87CEEB',라비:'#DDA0DD',유나:'#FFE8A3',기타천재:'#B9E4FF',삼전:'#B9E4FF',딸기가조아:'#FFD6D6'};
  const color=cmap[name]||'#86E26E';
  const goals=[{n:'원하는 곳에 취업하기',subs:[{n:'토익900',c:'#FFE8A3',items:['RC 1회 풀기','LC 1회 풀기','단어 DAY1 암기']},{n:'컴활1급',c:'#B9B3FF',items:['컴활 강의 듣기','모의고사 1회 풀기']}]},{n:'건강한 몸 만들기',subs:[{n:'운동',c:'#FFD6D6',items:['하루 만보걷기','필라테스 가기']}]}];
  scr.innerHTML=`<div class="pg"><div class="hdr"><button class="ibtn" style="font-size:20px;" onclick="go('explore')">←</button><span style="font-size:15px;font-weight:700;flex:1;">${name}</span></div>
  <div style="padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;"><div style="width:48px;height:48px;border-radius:50%;background:${color};font-size:17px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;">${name[0]}</div><div style="flex:1;"><div style="font-size:15px;font-weight:700;">${name}</div><div style="font-size:11px;color:var(--t2);">#취업 #자기계발</div></div><button style="padding:6px 14px;border-radius:16px;border:1.5px solid #404040;background:var(--green);font-size:12px;font-weight:600;cursor:pointer;color:#fff;font-family:var(--font);">팔로우</button></div>
  <div style="padding:9px 16px;border-bottom:1px solid var(--border);flex-shrink:0;"><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--t2);margin-bottom:3px;"><span>오늘 달성률</span><span>78%</span></div><div style="background:#f0f0f0;height:9px;border-radius:5px;overflow:hidden;"><div style="width:78%;height:100%;background:var(--green);border-radius:5px;"></div></div></div>
  <div class="sc" style="padding:11px 16px;">${goals.map(g=>`<div style="margin-bottom:14px;"><div style="font-size:16px;font-weight:600;margin-bottom:7px;">${g.n}</div>${g.subs.map(s=>`<div style="margin-bottom:9px;"><span style="display:inline-block;padding:3px 11px;border-radius:6px;background:${s.c};border:1px solid #696969;font-size:11px;font-weight:500;margin-bottom:5px;">${s.n}</span>${s.items.map(item=>`<div style="display:flex;align-items:center;gap:7px;padding:4px 3px;border-bottom:1px solid #f5f5f5;font-size:12px;color:#333;"><div style="width:12px;height:12px;border:1.5px solid #bbb;border-radius:2px;flex-shrink:0;"></div>${item}</div>`).join('')}</div>`).join('')}</div>`).join('')}</div>
  ${BN('home')}</div>`;
}

function rFollowList(){
  const topF=[{n:'지나',c:'#86E26E',p:92},{n:'샘',c:'#FFB347',p:88},{n:'카일',c:'#87CEEB',p:75}];
  const allF=[{n:'라비',c:'#DDA0DD'},{n:'코끼리',c:'#90EE90'},{n:'아보카도',c:'#98FB98'},{n:'레몬',c:'#FFFACD'},{n:'카일',c:'#87CEEB'},{n:'지나',c:'#86E26E'}];
  const tab=S.followTab||'팔로워';
  scr.innerHTML=`<div class="pg"><div class="hdr"><button class="ibtn" style="font-size:20px;" onclick="goHome()">←</button><div style="display:flex;gap:18px;flex:1;justify-content:center;">${['팔로워','팔로잉'].map(t=>`<button onclick="S.followTab='${t}';rFollowList()" style="font-size:13px;font-weight:${tab===t?'700':'400'};background:none;border:none;cursor:pointer;border-bottom:2px solid ${tab===t?'var(--green)':'transparent'};padding-bottom:3px;font-family:var(--font);color:${tab===t?'var(--green)':'var(--t2)'};">${t} ${t==='팔로워'?30:24}</button>`).join('')}</div><button class="ibtn" style="font-size:21px;" onclick="go('explore')">+</button></div>
  <div style="padding:9px 16px;border-bottom:1px solid var(--border);flex-shrink:0;"><div style="display:flex;align-items:center;gap:7px;background:#f5f5f5;border-radius:8px;padding:7px 11px;"><span style="color:#999;font-size:13px;">🔍</span><input placeholder="검색" style="border:none;background:transparent;font-size:12px;outline:none;font-family:var(--font);flex:1;"></div></div>
  <div class="sc">
    <div style="padding:11px 16px 5px;font-size:12px;font-weight:700;color:var(--t2);">가장 달성률이 높은 계정</div>
    ${topF.map(f=>`<div onclick="S.viewUser='${f.n}';go('userFeed')" style="display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;border-bottom:1px solid #f8f8f8;"><div style="width:42px;height:42px;border-radius:50%;background:${f.c};font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${f.n[0]}</div><div style="flex:1;"><div style="font-size:13px;font-weight:600;">${f.n}</div><div style="font-size:10px;color:var(--t3);">달성률 ${f.p}%</div></div><div style="width:38px;height:38px;border-radius:50%;border:2.5px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--green);">${f.p}%</div></div>`).join('')}
    <div style="padding:11px 16px 5px;font-size:12px;font-weight:700;color:var(--t2);">모든 ${tab}</div>
    ${allF.map(f=>`<div onclick="S.viewUser='${f.n}';go('userFeed')" style="display:flex;align-items:center;gap:11px;padding:9px 16px;cursor:pointer;border-bottom:1px solid #f8f8f8;"><div style="width:42px;height:42px;border-radius:50%;background:${f.c};font-size:13px;font-weight:700;color:#444;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${f.n[0]}</div><span style="font-size:13px;font-weight:500;">${f.n}</span></div>`).join('')}
  </div>${BN('home')}</div>`;
}

function rTeaching(){
  const y=S.tMonth.getFullYear(),m=S.tMonth.getMonth();
  const days=['일','월','화','수','목','금','토'],first=new Date(y,m,1).getDay(),last=new Date(y,m+1,0).getDate();
  const unavail=[3,10,17,24,25,26];
  const avSlots=S.tDate?['10:30','11:00','2:00','2:30','4:00','5:00']:[];
  const canSub=S.tDate&&S.tTime;
  const amT=['10:00','10:30','11:00','11:30'],pmT=['1:00','1:30','2:00','2:30','3:00','3:30','4:00','4:30','5:00','5:30'];
  scr.innerHTML=`<div class="pg"><div class="hdr"><button class="ibtn" style="font-size:20px;" onclick="goHome()">←</button><span style="font-size:15px;font-weight:700;flex:1;">티칭 서비스</span></div>
  <div class="sc" style="padding:14px 16px;">
    <div style="background:#f0fff0;border:1px solid var(--green);border-radius:9px;padding:11px;margin-bottom:14px;font-size:12px;color:var(--t2);line-height:1.6;">💡 목표 달성 전문 멘토와 1:1 티칭 세션을 예약하세요.</div>
    <div style="margin-bottom:14px;"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;"><button class="ibtn" style="font-size:15px;" onclick="S.tMonth=new Date(${y},${m-1},1);R()">◀</button><span style="font-size:13px;font-weight:600;">${y}년 ${m+1}월</span><button class="ibtn" style="font-size:15px;" onclick="S.tMonth=new Date(${y},${m+1},1);R()">▶</button></div>
    <div class="cal-g">${days.map(d=>`<div class="cl">${d}</div>`).join('')}${[...Array(first)].map(()=>'<div></div>').join('')}${[...Array(last)].map((_,i)=>{const d=i+1,dw=new Date(y,m,d).getDay(),un=unavail.includes(d)||dw===0,sel=S.tDate===d;return `<div onclick="${un?'':'S.tDate='+d+';S.tTime=null;R()'}" class="cd${dw===0?' sun':''}${sel?' sel':''}" style="color:${un?'#ccc':'inherit'};cursor:${un?'default':'pointer'};">${d}</div>`;}).join('')}</div></div>
    <div style="font-size:14px;font-weight:700;margin-bottom:9px;">시간 선택</div>
    ${renderTimeGroups([{lb:'오전',slots:amT},{lb:'오후',slots:pmT}],avSlots)}
    <div style="margin-bottom:14px;"><div style="font-size:14px;font-weight:700;margin-bottom:7px;">상세 내역</div><textarea placeholder="질문사항을 기재해 주시면 티칭에 도움이 됩니다." oninput="S.tDetail=this.value" style="width:100%;height:72px;border:1px solid var(--border);border-radius:7px;padding:9px;font-size:12px;font-family:var(--font);resize:none;outline:none;line-height:1.6;">${S.tDetail||''}</textarea></div>
    ${canSub?`<div style="background:#f0fff0;border:1px solid var(--green);border-radius:7px;padding:10px;margin-bottom:12px;font-size:12px;">✅ 예약: 2023년 2월 ${S.tDate}일 ${S.tTime}</div>`:''}
    <button onclick="canSubClick()" class="${canSub?'g':'g2'}btn">신청하기</button>
  </div>${BN('home')}</div>`;
}
function canSubClick(){if(S.tDate&&S.tTime){submitTeach();}else{alert('날짜와 시간을 선택해주세요!');}}
function renderTimeGroups(groups, avSlots){
  return groups.map(function(g){
    const slots = g.slots.map(function(t){
      const av = avSlots.includes(t), sel = S.tTime===t;
      const onclick = av ? 'S.tTime=\''+t+'\';R()' : '';
      const bg = sel?'var(--green)':av?'#fff':'#F3F3F3';
      const border = sel?'#404040':av?'#404040':'#ccc';
      const color = sel?'#fff':av?'var(--green)':'#aaa';
      const cursor = av?'pointer':'default';
      return '<div onclick="'+onclick+'" style="padding:6px 11px;border-radius:6px;font-size:12px;cursor:'+cursor+';background:'+bg+';border:1px solid '+border+';color:'+color+';">'+t+'</div>';
    }).join('');
    return '<div style="margin-bottom:10px;"><div style="font-size:12px;color:var(--t2);margin-bottom:5px;">'+g.lb+'</div><div style="display:flex;flex-wrap:wrap;gap:6px;">'+slots+'</div></div>';
  }).join('');
}
function submitTeach(){alert('✅ 신청 완료!\n2023년 2월 '+S.tDate+'일 '+S.tTime+'\n곧 연락드립니다 😊');S.tDate=null;S.tTime=null;S.tDetail='';S.page='home';R();}
function addAlarm(){const t=prompt('알림 시간 추가:','오전 9:00');if(t&&t.trim())S.alarms.push(t.trim());S.showHam=false;R();}

render();
</script>
</body>
